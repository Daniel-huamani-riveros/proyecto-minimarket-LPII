<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- ESTILOS DEL SIDEBAR -->
<th:block th:fragment="styles">
<style>
    body { display: flex; min-height: 100vh; }
    .sidebar {
        width: 250px; background-color: #343a40;
        padding: 20px; position: fixed;
        height: 100vh; overflow-y: auto;
    }
    .sidebar h4 { color: white; text-align: center; margin-bottom: 30px; }
    .sidebar a {
        color: white; text-decoration: none;
        display: block; padding: 10px 15px;
        margin-bottom: 5px; border-radius: 5px;
        transition: background-color 0.3s;
    }
    .sidebar a:hover { background-color: #495057; }
    .menu-section {
        margin-top: 20px; color: #adb5bd;
        font-size: 12px; text-transform: uppercase;
        font-weight: bold; margin-bottom: 10px;
    }
    .content { margin-left: 250px; padding: 20px; width: 100%; }
    .user-info {
        color: white; text-align: center; padding: 10px;
        background-color: #495057; border-radius: 5px;
        margin-bottom: 20px; font-size: 14px;
    }
    .user-info small { display: block; color: #adb5bd; font-size: 11px; margin-top: 5px; }
    .btn-logout { width: 100%; margin-top: 20px; }
</style>
</th:block>

<!-- SIDEBAR -->
<div th:fragment="sidebar" class="sidebar">
    <h4>🏪 Inventario</h4>

    <div class="user-info">
        <strong th:text="${session.nombreCompleto}"></strong>
        <small th:text="${session.rol}"></small>
    </div>

    <a th:href="@{/home}">🏠 Inicio</a>

    <div class="menu-section">Gestión</div>
    <a th:href="@{/producto}">📦 Productos</a>
    <a th:href="@{/proveedor}">🏢 Proveedores</a>
    <a th:href="@{/compra}">➕ Compra</a>

    <div class="menu-section">Reportes</div>
    <a th:href="@{/producto/reporte/stock}">⚠️ Stock Bajo</a>
    <a th:href="@{/compra/historial}">📋 Historial Compras</a>
    <a th:href="@{/producto/reporte/vencimiento}">⏰ Productos a Vencer</a>

    <!-- SOLO ADMINISTRADOR -->
    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">
        <div class="menu-section">Administración</div>
        <a th:href="@{/usuario}">👥 Gestión de Usuarios</a>
    </th:block>

    <a th:href="@{/logout}" class="btn btn-danger btn-logout">🚪 Cerrar Sesión</a>
</div>

</html>
