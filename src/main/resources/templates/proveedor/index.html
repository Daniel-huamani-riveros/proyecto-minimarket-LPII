<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Proveedores</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <h1 class="mb-4">Gestión de Proveedores</h1>

    <!-- BOTÓN NUEVO - SOLO ADMINISTRADOR -->
    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">
        <a th:href="@{/proveedor/new}" class="btn btn-sm btn-success mb-3">Nuevo Proveedor</a>
    </th:block>

    <!-- MENSAJE -->
    <div th:if="${MENSAJE}" th:class="'alert alert-' + ${TIPO} + ' alert-dismissible fade show'" role="alert">
        <span th:text="${MENSAJE}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Nombre</th>
                <th>Teléfono</th>
                <th>Dirección</th>
                <th th:if="${session.rol == 'ADMINISTRADOR'}">Opciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(proveedores)}">
                <td colspan="5" class="text-center text-muted">No hay proveedores registrados</td>
            </tr>
            <tr th:each="row : ${proveedores}">
                <td><span class="badge bg-primary" th:text="${row.idProveedor}"></span></td>
                <td th:text="${row.nombre}"></td>
                <td th:text="${row.telefono}"></td>
                <td th:text="${row.direccion}"></td>
                <td th:if="${session.rol == 'ADMINISTRADOR'}">
                    <a th:href="@{/proveedor/edit/{id}(id=${row.idProveedor})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/proveedor/{id}(id=${row.idProveedor})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
