<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registrar Proveedor</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">

    <!-- SOLO ADMINISTRADOR -->
    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h4 class="mb-0">Registrar Proveedor</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/proveedor}" th:object="${proveedor}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input class="form-control" type="text" th:field="*{nombre}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input class="form-control" type="text" th:field="*{telefono}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input class="form-control" type="text" th:field="*{direccion}" required>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Registrar</button>
                        <a th:href="@{/proveedor}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block>

    <!-- ACCESO DENEGADO -->
    <th:block th:unless="${session.rol == 'ADMINISTRADOR'}">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading">⛔ Acceso Denegado</h4>
            <p>No tienes permisos para registrar proveedores.</p>
            <hr>
            <p class="mb-0">Esta función está restringida solo para <strong>ADMINISTRADORES</strong>.</p>
            <a th:href="@{/proveedor}" class="btn btn-primary mt-3">Volver al Listado</a>
        </div>
    </th:block>

</div>

</body>
</html>
