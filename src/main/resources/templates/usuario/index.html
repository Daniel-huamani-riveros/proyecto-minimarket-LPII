<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Usuarios</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">

    <!-- SOLO ADMINISTRADOR -->
    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">

        <h1 class="mb-4">Gestión de Usuarios</h1>

        <a th:href="@{/usuario/new}" class="btn btn-sm btn-success mb-3">Nuevo Usuario</a>

        <!-- MENSAJE -->
        <div th:if="${MENSAJE}" th:class="'alert alert-' + ${TIPO} + ' alert-dismissible fade show'" role="alert">
            <span th:text="${MENSAJE}"></span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <table class="table table-striped table-hover">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Usuario</th>
                    <th>Nombre Completo</th>
                    <th>Rol</th>
                    <th>Opciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="row : ${usuarios}">
                    <td><span class="badge bg-primary" th:text="${row.idUsuario}"></span></td>
                    <td><strong th:text="${row.username}"></strong></td>
                    <td th:text="${row.nombreCompleto}"></td>
                    <td>
                        <span th:if="${row.rol.descripcion == 'ADMINISTRADOR'}"
                              class="badge bg-danger" th:text="${row.rol.descripcion}"></span>
                        <span th:unless="${row.rol.descripcion == 'ADMINISTRADOR'}"
                              class="badge bg-info" th:text="${row.rol.descripcion}"></span>
                    </td>
                    <td>
                        <a th:href="@{/usuario/edit/{id}(id=${row.idUsuario})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/usuario/{id}(id=${row.idUsuario})}"
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Estás seguro de eliminar este usuario?')">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>

    </th:block>

    <!-- ACCESO DENEGADO -->
    <th:block th:unless="${session.rol == 'ADMINISTRADOR'}">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading">⛔ Acceso Denegado</h4>
            <p>No tienes permisos para gestionar usuarios.</p>
            <hr>
            <p class="mb-0">Esta función está restringida solo para <strong>ADMINISTRADORES</strong>.</p>
            <a th:href="@{/home}" class="btn btn-primary mt-3">Volver al Inicio</a>
        </div>
    </th:block>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
