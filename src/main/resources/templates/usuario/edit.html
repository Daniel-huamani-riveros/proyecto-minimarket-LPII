<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Editar Usuario</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">

    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">
        <div class="card shadow">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">Editar Usuario</h4>
            </div>
            <div class="card-body">
                <form th:action="@{/usuario/{id}(id=${usuario.idUsuario})}" th:object="${usuario}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <input class="form-control" type="text" th:field="*{username}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <input class="form-control" type="password" th:field="*{password}" required>
                        <small class="text-muted">Deja la actual o ingresa una nueva</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nombre Completo</label>
                        <input class="form-control" type="text" th:field="*{nombreCompleto}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Rol</label>
                        <select class="form-select" th:field="*{rol.idRol}" required>
                            <option th:each="r : ${rolList}"
                                    th:value="${r.idRol}"
                                    th:text="${r.descripcion}"></option>
                        </select>
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <button type="submit" class="btn btn-success">Actualizar</button>
                        <a th:href="@{/usuario}" class="btn btn-secondary">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </th:block>

    <th:block th:unless="${session.rol == 'ADMINISTRADOR'}">
        <div class="alert alert-danger" role="alert">
            <h4 class="alert-heading">⛔ Acceso Denegado</h4>
            <p>No tienes permisos para editar usuarios.</p>
            <hr>
            <p class="mb-0">Esta función está restringida solo para <strong>ADMINISTRADORES</strong>.</p>
            <a th:href="@{/home}" class="btn btn-primary mt-3">Volver al Inicio</a>
        </div>
    </th:block>

</div>

</body>
</html>
