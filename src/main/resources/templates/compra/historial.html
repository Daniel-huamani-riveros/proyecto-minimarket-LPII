<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Historial de Compras</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
<style>
    .detalle-productos {
        background-color: #f8f9fa;
        padding: 15px; margin: 10px 0;
        border-left: 4px solid #007bff;
    }
    .producto-item {
        padding: 5px 0;
        border-bottom: 1px solid #dee2e6;
    }
    .producto-item:last-child { border-bottom: none; }
</style>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <div class="card shadow">
        <div class="card-header bg-info text-white">
            <h4 class="mb-0">Historial de Compras</h4>
        </div>
        <div class="card-body">

            <div class="card mb-3">
                <div class="card-body">
                    <form th:action="@{/compra/buscar}" method="get" class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">Fecha Inicio</label>
                            <input type="date" name="fechaInicio" class="form-control" th:value="${fechaInicio}">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Fecha Fin</label>
                            <input type="date" name="fechaFin" class="form-control" th:value="${fechaFin}">
                        </div>
                        <div class="col-md-4 d-flex align-items-end gap-2">
                            <button type="submit" class="btn btn-primary">🔍 Buscar</button>
                            <a th:href="@{/compra/historial}" class="btn btn-secondary">Ver Todas</a>
                        </div>
                    </form>
                    <div th:if="${fechaInicio != null and fechaFin != null}" class="alert alert-info mt-3 mb-0">
                        Compras entre <strong th:text="${fechaInicio}"></strong> y
                        <strong th:text="${fechaFin}"></strong>
                    </div>
                </div>
            </div>

            <p class="text-muted">Registro completo de todas las compras realizadas</p>

            <div th:if="${#lists.isEmpty(compras)}" class="alert alert-warning">
                No hay compras registradas.
            </div>

            <div th:unless="${#lists.isEmpty(compras)}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Guía</th>
                            <th>Fecha</th>
                            <th>Proveedor</th>
                            <th>Nro Productos</th>
                            <th width="150">Acciones</th>
                        </tr>
                    </thead>
                    <tbody style="background-color: white;">
                        <th:block th:each="compra : ${compras}">
                            <tr>
                                <td>
                                    <span class="badge bg-primary" th:text="'GR-' + ${compra.idCompra}"></span>
                                </td>
                                <td th:text="${#dates.format(compra.fecha, 'dd/MM/yyyy')}"></td>
                                <td>
                                    <span class="badge bg-secondary" th:text="${compra.proveedor.nombre}"></span>
                                </td>
                                <td class="text-center">
                                    <span class="badge bg-info" th:text="${#lists.size(compra.detalles)}"></span>
                                </td>
                                <td class="text-center">
                                    <button class="btn btn-sm btn-primary"
                                            th:onclick="'toggleDetalle(' + ${compra.idCompra} + ')'">
                                        📋 Ver Detalle
                                    </button>
                                </td>
                            </tr>
                            <tr th:id="'detalle-' + ${compra.idCompra}" style="display:none;">
                                <td colspan="5">
                                    <div class="detalle-productos">
                                        <h6><strong th:text="'Productos de la Compra GR-' + ${compra.idCompra}"></strong></h6>
                                        <div th:each="det : ${compra.detalles}" class="producto-item row">
                                            <div class="col-md-8" th:text="'• ' + ${det.producto.nombre}"></div>
                                            <div class="col-md-4 text-end">
                                                <span class="badge bg-success" th:text="${det.cantidad} + ' unidades'"></span>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
                <p class="text-muted mt-3">
                    <strong>Total de compras:</strong>
                    <span th:text="${#lists.size(compras)}"></span>
                </p>
            </div>

        </div>
    </div>
</div>

<script>
    function toggleDetalle(idCompra) {
        const fila = document.getElementById('detalle-' + idCompra);
        fila.style.display = (fila.style.display === 'none') ? 'table-row' : 'none';
    }
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
