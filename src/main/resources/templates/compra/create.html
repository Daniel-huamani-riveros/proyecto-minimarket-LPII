<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Registrar Compra</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <div class="card shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Registrar Compra</h4>
        </div>
        <div class="card-body">

            <div th:if="${MENSAJE}" th:class="'alert alert-' + ${TIPO} + ' alert-dismissible fade show'" role="alert">
                <span th:text="${MENSAJE}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <form id="formCompra" th:action="@{/compra}" method="post">

                <div class="row mb-4">
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Proveedor *</label>
                        <input type="text" id="buscarProveedor" class="form-control mb-1"
                               placeholder="🔍 Escriba para buscar proveedor...">
                        <select class="form-select" name="proveedor.idProveedor" id="selectProveedor" required>
                            <option value="">Seleccione un proveedor</option>
                            <option th:each="pr : ${proveedores}"
                                    th:value="${pr.idProveedor}"
                                    th:text="${pr.nombre}"></option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label fw-bold">Fecha *</label>
                        <input class="form-control" type="date" name="fecha" required>
                    </div>
                </div>

                <hr>

                <h5 class="mb-3">Productos a Comprar</h5>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Producto</label>
                        <input type="text" id="buscarProducto" class="form-control mb-1"
                               placeholder="🔍 Escriba para buscar producto...">
                        <select class="form-select" id="selectProducto">
                            <option value="">Seleccione un producto</option>
                            <option th:each="p : ${productos}"
                                    th:value="${p.idProducto}"
                                    th:text="${p.nombre}"
                                    th:attr="data-nombre=${p.nombre}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label">Cantidad</label>
                        <input class="form-control" type="number" id="inputCantidad" min="1" value="1">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="button" class="btn btn-success w-100" onclick="agregarProducto()">
                            ➕ Agregar
                        </button>
                    </div>
                </div>

                <div class="table-responsive mb-3">
                    <table class="table table-bordered table-hover table-striped">
                        <thead class="table-dark">
                            <tr>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th width="100">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaProductos" style="background-color: white;"></tbody>
                    </table>
                </div>

                <div id="mensajeVacio" class="alert alert-warning">
                    ⚠️ No has agregado ningún producto. Usa el selector de arriba para agregar productos.
                </div>

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-primary btn-lg" id="btnRegistrar" disabled>
                        💾 Registrar Compra
                    </button>
                    <button type="button" class="btn btn-secondary btn-lg" onclick="limpiarTodo()">
                        🔄 Limpiar Todo
                    </button>
                </div>

            </form>
        </div>
    </div>
</div>

<script>
    let productosAgregados = [];

    document.getElementById('buscarProveedor').addEventListener('keyup', function() {
        const q = this.value;
        if (q.length < 1) return;
        fetch('/proveedor/buscarAjax?q=' + q)
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('selectProveedor');
                select.innerHTML = '<option value="">Seleccione un proveedor</option>';
                data.forEach(p => {
                    select.innerHTML += '<option value="' + p.idProveedor + '">' + p.nombre + '</option>';
                });
            });
    });

    document.getElementById('buscarProducto').addEventListener('keyup', function() {
        const q = this.value;
        if (q.length < 1) return;
        fetch('/producto/buscarAjax?q=' + q)
            .then(r => r.json())
            .then(data => {
                const select = document.getElementById('selectProducto');
                select.innerHTML = '<option value="">Seleccione un producto</option>';
                data.forEach(p => {
                    select.innerHTML += '<option value="' + p.idProducto + '" data-nombre="' + p.nombre + '">' + p.nombre + '</option>';
                });
            });
    });

    function agregarProducto() {
        const selectProducto = document.getElementById('selectProducto');
        const inputCantidad = document.getElementById('inputCantidad');
        const idProducto = selectProducto.value;
        const nombreProducto = selectProducto.options[selectProducto.selectedIndex].text;
        const cantidad = parseInt(inputCantidad.value);

        if (!idProducto) { alert('⚠️ Por favor selecciona un producto'); return; }
        if (cantidad <= 0 || isNaN(cantidad)) { alert('⚠️ La cantidad debe ser mayor a 0'); return; }

        const existe = productosAgregados.find(p => p.idProducto === idProducto);
        if (existe) { alert('⚠️ Este producto ya fue agregado.'); return; }

        productosAgregados.push({ idProducto, nombreProducto, cantidad });
        actualizarTabla();
        selectProducto.value = '';
        inputCantidad.value = '1';
        document.getElementById('buscarProducto').value = '';
    }

    function actualizarTabla() {
        const tbody = document.getElementById('tablaProductos');
        const mensajeVacio = document.getElementById('mensajeVacio');
        const btnRegistrar = document.getElementById('btnRegistrar');

        tbody.innerHTML = '';

        if (productosAgregados.length === 0) {
            mensajeVacio.style.display = 'block';
            btnRegistrar.disabled = true;
            return;
        }

        mensajeVacio.style.display = 'none';
        btnRegistrar.disabled = false;

        productosAgregados.forEach((producto, index) => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${producto.nombreProducto}</td>
                <td>${producto.cantidad}</td>
                <td class="text-center">
                    <button type="button" class="btn btn-danger btn-sm" onclick="eliminarProducto(${index})">
                        🗑️ Eliminar
                    </button>
                </td>`;
            tbody.appendChild(tr);
        });
    }

    function eliminarProducto(index) {
        productosAgregados.splice(index, 1);
        actualizarTabla();
    }

    function limpiarTodo() {
        if (productosAgregados.length > 0) {
            if (!confirm('¿Estás seguro de eliminar todos los productos agregados?')) return;
        }
        productosAgregados = [];
        actualizarTabla();
        document.getElementById('selectProducto').value = '';
        document.getElementById('inputCantidad').value = '1';
        document.getElementById('buscarProducto').value = '';
        document.getElementById('buscarProveedor').value = '';
    }

    document.getElementById('formCompra').addEventListener('submit', function(e) {
        if (productosAgregados.length === 0) {
            e.preventDefault();
            alert('⚠️ Debes agregar al menos un producto');
            return;
        }

        document.querySelectorAll('.detalle-input').forEach(el => el.remove());

        productosAgregados.forEach((producto, index) => {
            const inputId = document.createElement('input');
            inputId.type = 'hidden';
            inputId.name = 'detalles[' + index + '].producto.idProducto';
            inputId.value = producto.idProducto;
            inputId.className = 'detalle-input';
            this.appendChild(inputId);

            const inputCant = document.createElement('input');
            inputCant.type = 'hidden';
            inputCant.name = 'detalles[' + index + '].cantidad';
            inputCant.value = producto.cantidad;
            inputCant.className = 'detalle-input';
            this.appendChild(inputCant);
        });
    });

    window.addEventListener('load', function() {
        actualizarTabla();
        document.querySelector('[name="fecha"]').value = new Date().toISOString().split('T')[0];
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
