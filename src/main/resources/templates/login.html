<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Login - Hemenkis</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
    body {
        background-color: #f0f2f5;
        min-height: 100vh;
        display: flex;
        align-items: center;
    }

    .card {
        border: none;
        border-radius: 10px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }

    .card-header {
        border-radius: 10px 10px 0 0 !important;
        padding: 20px;
    }

    .btn-primary {
        padding: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white text-center">
                    <h5 class="mb-0">🏪 Sistema Hemenkis</h5>
                    <small>Inicia sesión para continuar</small>
                </div>
                <div class="card-body p-4">

                    <div th:if="${MENSAJE}" th:class="'alert alert-' + ${TIPO} + ' alert-dismissible fade show'" role="alert">
                        <span th:text="${MENSAJE}"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>

                    <form th:action="@{/login}" th:object="${usuario}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Usuario</label>
                            <input type="text" class="form-control" th:field="*{username}"
                                   placeholder="Ingresa tu usuario" required autofocus>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Contraseña</label>
                            <input type="password" class="form-control" th:field="*{password}"
                                   placeholder="Ingresa tu contraseña" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Ingresar</button>
                        </div>
                    </form>

                </div>
                <div class="card-footer text-center text-muted" style="font-size: 0.8rem;">
                    © 2026 Hemenkis System
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
