<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Gestión de Productos</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <h1 class="mb-4">Gestión de Productos</h1>

    <!-- BÚSQUEDA -->
    <div class="card mb-3">
        <div class="card-body">
            <form th:action="@{/producto/buscar}" method="get" class="row g-3">
                <div class="col-md-8">
                    <label class="form-label">Buscar Producto por Nombre</label>
                    <input type="text" class="form-control" name="nombre"
                           placeholder="Ingrese nombre del producto..."
                           th:value="${busqueda}">
                </div>
                <div class="col-md-4 d-flex align-items-end gap-2">
                    <button type="submit" class="btn btn-primary">🔍 Buscar</button>
                    <a th:href="@{/producto}" class="btn btn-secondary">Ver Todos</a>
                </div>
            </form>
            <div th:if="${busqueda}" class="alert alert-info mt-3 mb-0">
                Resultados de búsqueda: "<strong th:text="${busqueda}"></strong>" -
                <strong th:text="${#lists.size(productos)}"></strong> producto(s) encontrado(s)
            </div>
        </div>
    </div>

    <!-- BOTÓN NUEVO - SOLO ADMINISTRADOR -->
    <th:block th:if="${session.rol == 'ADMINISTRADOR'}">
        <a th:href="@{/producto/new}" class="btn btn-sm btn-success mb-3">Nuevo Producto</a>
    </th:block>

    <!-- MENSAJE -->
    <div th:if="${MENSAJE}" th:class="'alert alert-' + ${TIPO} + ' alert-dismissible fade show'" role="alert">
        <span th:text="${MENSAJE}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Código</th>
                <th>Descripción</th>
                <th>Precio Compra</th>
                <th>Precio Venta</th>
                <th>Stock</th>
                <th>Fecha Vencimiento</th>
                <th th:if="${session.rol == 'ADMINISTRADOR'}">Opciones</th>
            </tr>
        </thead>
        <tbody>
            <tr th:if="${#lists.isEmpty(productos)}">
                <td colspan="7" class="text-center text-muted">No se encontraron productos</td>
            </tr>
            <tr th:each="row : ${productos}">
                <td><span class="badge bg-primary" th:text="${row.idProducto}"></span></td>
                <td th:text="${row.nombre}"></td>
                <td th:text="'S/ ' + ${row.precioCompra}"></td>
                <td th:text="'S/ ' + ${row.precioVenta}"></td>
                <td>
                    <span th:if="${row.stock == 0}" class="badge bg-danger" th:text="${row.stock}"></span>
                    <span th:if="${row.stock > 0 and row.stock <= 5}" class="badge bg-warning text-dark" th:text="${row.stock}"></span>
                    <span th:if="${row.stock > 5}" class="badge bg-success" th:text="${row.stock}"></span>
                </td>
                <td th:text="${#dates.format(row.fechaVencimiento, 'dd/MM/yyyy')}"></td>
                <td th:if="${session.rol == 'ADMINISTRADOR'}">
                    <a th:href="@{/producto/edit/{id}(id=${row.idProducto})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/producto/{id}(id=${row.idProducto})}"
                       class="btn btn-sm btn-danger"
                       onclick="return confirm('¿Estás seguro de eliminar?')">Eliminar</a>
                </td>
            </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
