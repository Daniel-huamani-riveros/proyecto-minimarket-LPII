<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Reporte - Productos a Vencer</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <div class="card shadow">
        <div class="card-header bg-danger text-white">
            <h4 class="mb-0">⏰ Reporte: Productos Próximos a Vencer</h4>
        </div>
        <div class="card-body">
            <p class="text-muted">Productos que vencen en los próximos <strong th:text="${diasLimite}"></strong> días</p>

            <div th:if="${#lists.isEmpty(productos)}" class="alert alert-success">
                ✅ No hay productos próximos a vencer. ¡Todo bien!
            </div>

            <div th:unless="${#lists.isEmpty(productos)}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Stock</th>
                            <th>Fecha Vencimiento</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${productos}">
                            <td><span class="badge bg-primary" th:text="${row.idProducto}"></span></td>
                            <td th:text="${row.nombre}"></td>
                            <td><span class="badge bg-info" th:text="${row.stock}"></span></td>
                            <td th:text="${#dates.format(row.fechaVencimiento, 'dd/MM/yyyy')}"></td>
                        </tr>
                    </tbody>
                </table>
                <p class="text-muted mt-3">
                    <strong>Total:</strong> <span th:text="${#lists.size(productos)}"></span> producto(s)
                </p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
