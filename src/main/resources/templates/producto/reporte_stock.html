<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Reporte - Stock Bajo</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
<th:block th:replace="~{fragments/sidebar :: styles}"></th:block>
</head>
<body>

<th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>

<div class="content">
    <div class="card shadow">
        <div class="card-header bg-warning text-dark d-flex justify-content-between align-items-center">
            <h4 class="mb-0">⚠️ Reporte: Productos con Stock Bajo</h4>
            <a th:href="@{/producto/reporte/stock/pdf}" class="btn btn-danger btn-sm">
                📄 Descargar PDF
            </a>
        </div>
        <div class="card-body">
            <p class="text-muted">Productos con stock menor o igual a <strong th:text="${stockMinimo}"></strong> unidades</p>

            <div th:if="${#lists.isEmpty(productos)}" class="alert alert-success">
                ✅ No hay productos con stock bajo.
            </div>

            <div th:unless="${#lists.isEmpty(productos)}" class="table-responsive">
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Código</th>
                            <th>Producto</th>
                            <th>Stock Actual</th>
                            <th>Precio Compra</th>
                            <th>Precio Venta</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="row : ${productos}">
                            <td><span class="badge bg-primary" th:text="${row.idProducto}"></span></td>
                            <td th:text="${row.nombre}"></td>
                            <td>
                                <span th:if="${row.stock == 0}" class="badge bg-danger" th:text="${row.stock}"></span>
                                <span th:if="${row.stock > 0 and row.stock <= 5}" class="badge bg-warning text-dark" th:text="${row.stock}"></span>
                                <span th:if="${row.stock > 5}" class="badge bg-info" th:text="${row.stock}"></span>
                            </td>
                            <td th:text="'S/ ' + ${row.precioCompra}"></td>
                            <td th:text="'S/ ' + ${row.precioVenta}"></td>
                            <td>
                                <span th:if="${row.stock == 0}" class="badge bg-danger">SIN STOCK</span>
                                <span th:if="${row.stock > 0 and row.stock <= 5}" class="badge bg-warning text-dark">CRÍTICO</span>
                                <span th:if="${row.stock > 5}" class="badge bg-warning text-dark">BAJO</span>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
